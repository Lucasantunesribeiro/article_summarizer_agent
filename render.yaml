services:
  - type: web
    name: article_summarizer_agent
    env: python
    buildCommand: "./render-build.sh"
    startCommand: "python app.py"
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.0
      - key: CHROME_BIN
        value: /opt/render/project/src/opt/chrome/chrome-linux64/chrome
