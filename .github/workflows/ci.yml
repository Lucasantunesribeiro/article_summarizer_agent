name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check .
      - run: ruff format --check .

  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: summarizer_test
          POSTGRES_USER: summarizer
          POSTGRES_PASSWORD: summarizer
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      rabbitmq:
        image: rabbitmq:3.13
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5672:5672
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Download NLTK data
        run: |
          python -c "
          import nltk
          for pkg in ('punkt', 'punkt_tab', 'stopwords', 'wordnet'):
              nltk.download(pkg, quiet=True)
          "
      - name: Run tests
        run: pytest tests/ -v --tb=short --cov --cov-report=term-missing --cov-report=xml
        env:
          GEMINI_API_KEY: "test-key"
          FLASK_DEBUG: "true"
          SECRET_KEY: "test-secret-key"
          ADMIN_PASSWORD: "Admin123!"
          DATABASE_URL: "postgresql://summarizer:summarizer@localhost:5432/summarizer_test"
          CELERY_BROKER_URL: "amqp://guest:guest@localhost:5672//"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t article-summarizer:ci .
